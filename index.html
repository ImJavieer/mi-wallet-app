<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Wallet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h2 id="header-title">Panel</h2>
    </header>

    <main id="inicio-panel" class="panel active">
        <section class="balances" id="balances-container">
            <div class="card add-action" id="open-add-account-modal">
                <div class="icon-bg blue add-icon"><span>+</span></div>
                <div class="card-text">
                    <span style="color: #aaa;">AGREGAR CUENTA</span>
                </div>
            </div>
        </section>

        <section class="recent-records">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3>Últimos registros</h3>
                <button id="open-add-modal" style="background: #2196f3; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer;">+</button>
            </div>
            <ul id="records-list"></ul>
        </section>
    </main>

    <main id="estadisticas-panel" class="panel" style="display: none;">
        <section class="stats-list">
            <div class="stat-item">
                <div class="stat-info">
                    <span>PATRIMONIO NETO</span>
                    <h3 id="stat-saldo">$0</h3>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-info">
                    <span>GASTOS</span>
                    <h3 id="stat-gastos">$0</h3>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-info">
                    <span>FLUJO DE EFECTIVO</span>
                    <h3 id="stat-flujo">$0</h3>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-info">
                    <span>INGRESOS</span>
                    <h3 id="stat-ingresos">$0</h3>
                </div>
            </div>
        </section>

        <section class="chart-container">
            <canvas id="myChart"></canvas>
        </section>
    </main>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="close-modal">X</span>
            <h3>Registro</h3>
            <form id="record-form">
                <select id="type" required>
                    <option value="gasto">Gasto</option>
                    <option value="ingreso">Ingreso</option>
                    </select>
                
                <select id="account-select" required>
                    </select>

                <select id="category" required>
                    </select>
                
                <input type="text" id="new-category-input" placeholder="Nombre de nueva categoría" style="display: none;">

                <input type="number" id="amount" placeholder="Monto" required>
                <input type="text" id="description" placeholder="Descripción" required>
                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <div id="account-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="close-account-modal">X</span>
            <h3>Nueva Cuenta</h3>
            <form id="account-form">
                <input type="text" id="acc-name" placeholder="Nombre de la cuenta (ej. CASH, CMR)" required>
                <select id="acc-type" required>
                    <option value="debito">Débito / Efectivo / Ahorro</option>
                    <option value="credito">Tarjeta de Crédito</option>
                </select>
                
                <div id="debito-fields">
                    <input type="number" id="acc-balance" placeholder="Saldo actual" value="0">
                </div>
                
                <div id="credito-fields" style="display: none;">
                    <input type="number" id="acc-limit" placeholder="Cupo total de la tarjeta">
                    <input type="number" id="acc-used" placeholder="Monto utilizado actualmente">
                </div>

                <button type="submit">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <button id="nav-inicio" class="nav-btn active">
            <span class="icon">💲</span>
            Panel
        </button>
        <button id="nav-estadisticas" class="nav-btn">
            <span class="icon">📊</span>
            Estadísticas
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
