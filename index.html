<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Wallet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h2 id="header-title">Panel</h2>
    </header>

    <main id="inicio-panel" class="panel active">
        <section class="balances">
            <div class="card cash">
                <div class="icon-bg blue"><span>$</span></div>
                <div class="card-text">
                    <span>CASH</span>
                    <h3 id="cash-balance">$0</h3>
                </div>
            </div>
            <div class="card savings">
                <div class="icon-bg green"><span>A</span></div>
                <div class="card-text">
                    <span>AHORRO</span>
                    <h3 id="savings-balance">$0</h3>
                </div>
            </div>
            <div class="card credit">
                <div class="icon-bg orange"><span>C</span></div>
                <div class="card-text">
                    <span>TARJETA DE CRÉDITO</span>
                    <h3 id="credit-available">$0</h3>
                    <small>Utilizado: <span id="credit-balance">$0</span></small>
                </div>
            </div>
            <div class="card add-action" id="open-add-modal">
                <div class="icon-bg blue add-icon"><span>+</span></div>
                <div class="card-text">
                    <span style="color: #aaa;">AGREGAR</span>
                </div>
            </div>
        </section>

        <section class="recent-records">
            <h3>Últimos registros</h3>
            <ul id="records-list"></ul>
        </section>
    </main>

    <main id="estadisticas-panel" class="panel" style="display: none;">
        <section class="stats-list">
            <div class="stat-item">
                <div class="stat-info">
                    <span>SALDO (CASH)</span>
                    <h3 id="stat-saldo">$0</h3>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-info">
                    <span>GASTOS</span>
                    <h3 id="stat-gastos">$0</h3>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-info">
                    <span>FLUJO DE EFECTIVO</span>
                    <h3 id="stat-flujo">$0</h3>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-info">
                    <span>INGRESOS</span>
                    <h3 id="stat-ingresos">$0</h3>
                </div>
            </div>
        </section>

        <section class="chart-container">
            <canvas id="myChart"></canvas>
        </section>
    </main>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span id="close-modal">X</span>
            <h3>Registro</h3>
            <form id="record-form">
                <select id="type" required>
                    <option value="gasto-debito">Gasto Débito</option>
                    <option value="gasto-credito">Gasto Crédito</option>
                    <option value="ingreso">Ingreso (Sumar a Cash)</option>
                    <option value="abono-credito">Abono (Pago a Tarjeta)</option>
                    <option value="retiro-cash">Retiro / Transferencia externa</option>
                </select>
                <select id="category" required>
                    <option value="otros">Otros</option>
                    <option value="comida">Comida y bebida</option>
                    <option value="ropa">Ropa y calzado</option>
                    <option value="ocio">Ocio</option>
                    <option value="compras">Compras diarias</option>
                    <option value="supermercado">Supermercado</option>
                    <option value="membresias">Membresías</option>
                </select>
                <input type="number" id="amount" placeholder="Monto" required>
                <input type="text" id="description" placeholder="Descripción" required>
                <button type="submit">Guardar</button>
            </form>
        </div>
    </div>

    <nav class="bottom-nav">
        <button id="nav-inicio" class="nav-btn active">
            <span class="icon">💲</span>
            Panel
        </button>
        <button id="nav-estadisticas" class="nav-btn">
            <span class="icon">📊</span>
            Estadísticas
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
