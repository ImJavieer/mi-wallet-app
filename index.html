<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi-Wallet</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1 id="titulo-panel">Panel</h1>
    </header>

    <main id="inicio-panel">
      <section class="balances-grid" id="cuentas-contenedor">
        </section>

      <section class="ultimos-registros">
        <div class="registros-header">
          <h2>Últimos registros</h2>
          <button class="btn-add" onclick="abrirModal()">+</button>
        </div>
        <ul id="lista-historial">
          </ul>
      </section>
    </main>

    <main id="estadisticas-panel" class="hidden">
      <div class="chart-container">
        <canvas id="graficoGastos"></canvas>
      </div>
      <div class="stats-list" id="lista-estadisticas">
        </div>
    </main>

    <nav class="bottom-nav">
      <button onclick="cambiarPanel('inicio')" class="activo" id="btn-inicio">
        <span class="icon">💲</span>
        <span>Panel</span>
      </button>
      <button onclick="cambiarPanel('estadisticas')" id="btn-estadisticas">
        <span class="icon">📊</span>
        <span>Estadísticas</span>
      </button>
    </nav>
  </div>

  <div id="modal-registro" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="cerrarModal()">&times;</span>
      <h2>Nuevo Movimiento</h2>
      
      <div class="form-group">
        <label>Tipo</label>
        <select id="tipo-movimiento" onchange="verificarTipo()">
          <option value="gasto">Gasto</option>
          <option value="ingreso">Ingreso</option>
        </select>
      </div>

      <div class="form-group">
        <label>Cuenta</label>
        <select id="cuenta-movimiento"></select>
      </div>

      <div class="form-group">
        <label>Categoría</label>
        <select id="categoria" onchange="verificarCategoria()">
          </select>
      </div>

      <div class="form-group hidden" id="campo-otro-desc">
        <label id="label-otro">Descripción o Nombre</label>
        <input type="text" id="descripcion-otro" placeholder="Detalla el movimiento...">
      </div>

      <div class="form-group">
        <label>Monto</label>
        <input type="number" id="monto" placeholder="$0">
      </div>

      <button class="btn-guardar" onclick="guardarRegistro()">Guardar</button>
    </div>
  </div>

  <div id="modal-cuenta" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="cerrarModalCuenta()">&times;</span>
      <h2>Nueva Cuenta</h2>
      <div class="form-group">
        <label>Nombre de la Cuenta</label>
        <input type="text" id="nombre-cuenta" placeholder="Ej: Banco Estado">
      </div>
      <div class="form-group">
        <label>Tipo de Cuenta</label>
        <select id="tipo-cuenta" onchange="toggleCamposCuenta()">
          <option value="debito">Débito / Efectivo / Ahorro</option>
          <option value="credito">Tarjeta de Crédito</option>
        </select>
      </div>
      <div class="form-group" id="campo-saldo">
        <label>Saldo Inicial ($)</label>
        <input type="number" id="saldo-inicial" placeholder="0">
      </div>
      <div class="form-group hidden" id="campo-cupo">
        <label>Cupo Total ($)</label>
        <input type="number" id="cupo-total" placeholder="1000000">
      </div>
      <div class="form-group hidden" id="campo-utilizado">
        <label>Monto Utilizado ($)</label>
        <input type="number" id="monto-utilizado" placeholder="0">
      </div>
      <button class="btn-guardar" onclick="guardarNuevaCuenta()">Añadir Cuenta</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
